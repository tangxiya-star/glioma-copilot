# Render blueprint for the FastAPI backend.
# Render → New → Blueprint → connect this repo → it reads this file.
# You'll be prompted to paste ANTHROPIC_API_KEY and DATABASE_URL (sync: false).

services:
  - type: web
    name: glioma-copilot-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:3000
